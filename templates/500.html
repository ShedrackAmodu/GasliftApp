{% extends "base/base.html" %}

{% block title %}Server Error - Gas Lift{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 text-center py-5">
        <div class="card">
            <div class="card-body py-5">
                <i class="bi bi-exclamation-triangle" style="font-size: 4rem; color: #dc3545;"></i>
                <h1 class="mt-3">500</h1>
                <h4 class="text-muted">Server Error</h4>
                <p class="mt-3">Something went wrong on our end. Please try again later.</p>
                <a href="{% url 'dashboard' %}" class="btn btn-primary mt-3">
                    <i class="bi bi-house"></i> Go to Dashboard
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
